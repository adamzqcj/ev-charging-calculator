<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充电计算器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>充电计算器</h1>
        
        <div class="card">
            <h2>输入参数</h2>
            <div class="input-group">
                <label for="preset">选择预设</label>
                <select id="preset">
                    <option value="">-- 自定义 --</option>
                    <option value="xiaobao">小宝马</option>
                    <option value="xiaote">小特</option>
                    <option value="xiaobaixuan">小白轩</option>
                </select>
            </div>
            <div class="input-group">
                <label for="price">电费（元/度）</label>
                <input type="number" id="price" placeholder="例如：1.5" min="0" step="0.01">
            </div>
            <div class="input-group">
                <label for="range">满电实际续航（公里）</label>
                <input type="number" id="range" placeholder="例如：400" min="0" step="1">
            </div>
            <div class="input-group">
                <label for="capacity">电池容量（度）</label>
                <input type="number" id="capacity" placeholder="例如：60" min="0" step="0.1">
            </div>
        </div>

        <div class="card result-card">
            <h2>计算结果</h2>
            <div class="result-grid">
                <div class="result-item">
                    <span class="result-label">百公里电耗</span>
                    <span class="result-value" id="consumption">--</span>
                    <span class="result-unit">度/百公里</span>
                </div>
                <div class="result-item">
                    <span class="result-label">每百公里花费</span>
                    <span class="result-value" id="costPerHundred">--</span>
                    <span class="result-unit">元/百公里</span>
                </div>
                <div class="result-item">
                    <span class="result-label">每公里花费</span>
                    <span class="result-value" id="costPerKm">--</span>
                    <span class="result-unit">元/公里</span>
                </div>
                <div class="result-item">
                    <span class="result-label">充满需花费</span>
                    <span class="result-value" id="fullCharge">--</span>
                    <span class="result-unit">元</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
